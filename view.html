<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術資料 — SmileRT LIVE Manager</title>
    <meta name="description" content="SmileRT 技術資料 — タイムテーブル・セットリスト・テクニカル情報">
    <link rel="stylesheet" href="css/style.css">
    <script>if(localStorage.getItem('smilert-theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
    <style>
        .view-header {
            padding: var(--space-2xl) 0 var(--space-lg)
        }

        .event-selector {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap
        }

        .event-selector select {
            min-width: 280px
        }

        .schedule-info {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: var(--space-sm) var(--space-lg);
            padding: var(--space-lg);
            background: var(--bg-glass-strong);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-xl);
        }

        .schedule-info .si {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 0.85rem
        }

        .schedule-info .si-label {
            color: var(--text-muted);
            white-space: nowrap
        }

        .schedule-info .si-time {
            font-family: var(--font-mono);
            font-weight: 700
        }

        .tt-wrap {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--bg-glass);
            max-width: calc(100vw - 2rem);
            -webkit-overflow-scrolling: touch;
        }

        .tt-wrap table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px
        }

        .tt-wrap thead th {
            background: var(--bg-glass-strong);
            padding: 0.5rem 0.4rem;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 2;
            white-space: nowrap
        }

        .tt-wrap tbody td {
            padding: 0.35rem 0.4rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.82rem;
            vertical-align: middle;
            white-space: nowrap
        }

        .tt-wrap tbody tr:hover {
            background: var(--bg-card-hover)
        }

        .tt-wrap tbody tr.special-row {
            background: rgba(251, 191, 36, 0.06)
        }

        .tt-wrap tbody tr.special-row td {
            color: var(--accent-yellow);
            font-weight: 600
        }

        /* Timetable Column Borders */
        .tt-wrap thead th,
        .tt-wrap tbody td {
            border-left: 1px solid var(--border-color);
        }

        .tt-wrap thead th:first-child,
        .tt-wrap tbody td:first-child {
            border-left: none;
        }

        .tt-wrap thead th.col-group-start,
        .tt-wrap tbody td.col-group-start {
            border-left: 2px solid var(--border-color-hover);
        }

        /* Export buttons */
        .export-btns {
            display: flex;
            gap: var(--space-xs);
            flex-wrap: wrap;
        }

        .copy-success {
            animation: flashGreen 0.6s ease;
        }

        @keyframes flashGreen {
            0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5); }
            50% { box-shadow: 0 0 12px 4px rgba(52, 211, 153, 0.3); }
            100% { box-shadow: none; }
        }

        .audio-done {
            color: var(--accent-green);
            font-weight: 600
        }

        .audio-received {
            color: #f59e0b;
            font-weight: 600
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-lg);
            margin-top: var(--space-2xl)
        }

        .detail-card {
            break-inside: avoid
        }

        .detail-card .card-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-color)
        }

        .detail-card .card-header .order-badge {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0
        }

        .detail-card .song-item {
            display: flex;
            align-items: start;
            gap: var(--space-sm);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem
        }

        .detail-card .song-item:last-child {
            border-bottom: none
        }

        .detail-card .s-num {
            width: 22px;
            height: 22px;
            border-radius: var(--radius-full);
            background: rgba(124, 185, 204, 0.12);
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px
        }

        .summary-bar {
            display: flex;
            gap: var(--space-xl);
            flex-wrap: wrap;
            margin: var(--space-lg) 0
        }

        .summary-bar .si {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 0.85rem;
            color: var(--text-secondary)
        }

        .summary-bar .si strong {
            color: var(--text-primary);
            font-size: 1.1rem
        }

        /* ===== リハ時間トグル ===== */
        .tt-header-row {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .rehearsal-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            background: var(--bg-glass);
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .rehearsal-toggle:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .rehearsal-toggle.active {
            background: rgba(124, 185, 204, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            font-weight: 600;
        }

        .rehearsal-toggle .toggle-icon {
            display: inline-block;
            width: 28px;
            height: 16px;
            border-radius: 8px;
            background: var(--border-color);
            position: relative;
            transition: background 0.2s ease;
        }

        .rehearsal-toggle .toggle-icon::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.2s ease;
        }

        .rehearsal-toggle.active .toggle-icon {
            background: var(--accent-blue);
        }

        .rehearsal-toggle.active .toggle-icon::after {
            transform: translateX(12px);
        }

        .tt-wrap .col-rehearsal {
            color: var(--accent-blue);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .tt-wrap thead th.col-rehearsal {
            background: rgba(124, 185, 204, 0.10);
        }

        @media (max-width:768px) {
            .tt-wrap table {
                min-width: 600px
            }

            .detail-grid {
                grid-template-columns: 1fr
            }
        }

        @media print {

            @page {
                size: landscape;
                margin: 0.6cm;
            }

            /* ===== 非表示要素 ===== */
            .site-header,
            .event-selector,
            .no-print,
            .export-btns,
            #printOptions {
                display: none !important;
            }

            /* body::before 疑似要素を完全除去（変な線の原因） */
            body::before,
            body::after {
                content: none !important;
                display: none !important;
            }

            /* glass系の疑似要素による装飾線を除去 */
            .glass-card::before,
            .glass-card::after,
            .page-wrapper::before,
            .page-wrapper::after,
            .site-header::before,
            .site-header::after {
                content: none !important;
                display: none !important;
            }

            /* ===== 全テキスト黒色化 ===== */
            body,
            .page-wrapper,
            .container,
            div,
            span,
            p,
            td,
            th,
            label,
            strong,
            h1, h2, h3, h4, h5, h6 {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
            }

            /* ===== タイトル ===== */
            .view-header h1,
            .text-gradient {
                font-size: 1.2rem !important;
                -webkit-text-fill-color: #000 !important;
                background: none !important;
                color: #000 !important;
                margin-bottom: 0.3rem !important;
            }

            .view-header {
                padding: 0.3cm 0 0.2cm !important;
            }

            /* ===== レイアウト — 幅制御 ===== */
            html, body {
                width: 100% !important;
                max-width: none !important;
                overflow: visible !important;
                background: #fff !important;
            }

            .page-wrapper {
                max-width: none !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                min-height: auto !important;
                padding-bottom: 0 !important;
            }

            .container {
                max-width: none !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
            }

            /* ===== Glassmorphism 完全除去 ===== */
            .glass-card,
            .detail-card,
            .schedule-info,
            .tt-wrap {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                box-shadow: none !important;
                background: #fff !important;
            }

            /* ===== スケジュール情報 ===== */
            .schedule-info {
                background: #f5f5f5 !important;
                border: 1px solid #bbb !important;
                border-radius: 0 !important;
                margin-bottom: 0.3cm !important;
                padding: 0.2cm 0.3cm !important;
            }

            .schedule-info .si,
            .schedule-info .si-label {
                color: #333 !important;
                -webkit-text-fill-color: #333 !important;
                font-size: 7pt !important;
            }

            .schedule-info .si-time {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
            }

            /* ===== サマリーバー ===== */
            .summary-bar {
                margin: 0.15cm 0 0.2cm !important;
            }

            .summary-bar .si,
            .summary-bar .si span {
                color: #333 !important;
                -webkit-text-fill-color: #333 !important;
                font-size: 7.5pt !important;
            }

            .summary-bar .si strong {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
            }

            /* ===== タイムテーブル セクション ===== */
            #timetableSection {
                break-after: auto !important;
                page-break-after: auto !important;
            }

            #timetableSection h2 {
                font-size: 10pt !important;
                margin-bottom: 0.15cm !important;
            }

            .tt-wrap {
                border: 1px solid #999 !important;
                border-radius: 0 !important;
                overflow: visible !important;
                max-width: none !important;
                width: 100% !important;
            }

            .tt-wrap table {
                min-width: 0 !important;
                width: 100% !important;
                table-layout: auto !important;
                font-size: 6pt !important;
                border-collapse: collapse !important;
                /* transform は JS で制御しない — CSS で幅を制御 */
                transform: none !important;
            }

            /* セル: 折り返し許可 + コンパクト化 */
            .tt-wrap thead th,
            .tt-wrap thead th[style],
            .tt-wrap tbody td,
            .tt-wrap tbody td[style] {
                white-space: normal !important;
                word-break: break-word !important;
                overflow-wrap: break-word !important;
                overflow: visible !important;
            }

            .tt-wrap thead th {
                background: #e8e8e8 !important;
                color: #333 !important;
                -webkit-text-fill-color: #333 !important;
                border-bottom: 1.5px solid #333 !important;
                border-left: 1px solid #bbb !important;
                font-size: 5.5pt !important;
                padding: 1px 2px !important;
                position: static !important;
            }

            .tt-wrap thead th:first-child {
                border-left: none !important;
            }

            .tt-wrap tbody td {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
                border-bottom: 1px solid #ccc !important;
                border-left: 1px solid #ccc !important;
                font-size: 6pt !important;
                padding: 1px 2px !important;
                line-height: 1.3 !important;
            }

            .tt-wrap tbody td:first-child {
                border-left: none !important;
            }

            /* インラインスタイルの色を上書き */
            .tt-wrap tbody td[style],
            .tt-wrap tbody td div,
            .tt-wrap tbody td span {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
            }

            .tt-wrap tbody tr:hover {
                background: transparent !important;
            }

            /* 特殊行（休憩・交流会） */
            .tt-wrap tbody tr.special-row {
                background: #f5f5dc !important;
            }

            .tt-wrap tbody tr.special-row td,
            .tt-wrap tbody tr.special-row td span {
                color: #8B6914 !important;
                -webkit-text-fill-color: #8B6914 !important;
            }

            /* 列グループ境界 */
            .tt-wrap thead th.col-group-start,
            .tt-wrap tbody td.col-group-start {
                border-left: 1.5px solid #888 !important;
            }

            /* リハ経過列 */
            .tt-wrap thead th.col-rehearsal {
                background: #e0f0f5 !important;
                color: #1a6d82 !important;
                -webkit-text-fill-color: #1a6d82 !important;
                font-size: 5.5pt !important;
            }

            .tt-wrap tbody td.col-rehearsal {
                color: #1a6d82 !important;
                -webkit-text-fill-color: #1a6d82 !important;
                font-family: monospace !important;
                font-size: 6pt !important;
            }

            /* ===== 音源ステータス ===== */
            .audio-done {
                color: #166534 !important;
                -webkit-text-fill-color: #166534 !important;
            }

            .audio-received {
                color: #92400e !important;
                -webkit-text-fill-color: #92400e !important;
            }

            /* ===== バッジ ===== */
            .badge {
                border: 1px solid #999 !important;
                color: #333 !important;
                -webkit-text-fill-color: #333 !important;
                background: #f0f0f0 !important;
            }

            .badge-purple {
                color: #6b21a8 !important;
                -webkit-text-fill-color: #6b21a8 !important;
                border-color: #6b21a8 !important;
            }

            .badge-blue {
                color: #1e40af !important;
                -webkit-text-fill-color: #1e40af !important;
                border-color: #1e40af !important;
            }

            .badge-green {
                color: #166534 !important;
                -webkit-text-fill-color: #166534 !important;
                border-color: #166534 !important;
            }

            .badge-yellow {
                color: #92400e !important;
                -webkit-text-fill-color: #92400e !important;
                border-color: #92400e !important;
            }

            /* ===== カラースウォッチ ===== */
            .color-swatch {
                border: 2px solid #333 !important;
                print-color-adjust: exact !important;
                -webkit-print-color-adjust: exact !important;
            }

            /* ===== リンク ===== */
            a {
                color: #1e40af !important;
                -webkit-text-fill-color: #1e40af !important;
                text-decoration: underline !important;
            }

            /* ===== 出演者詳細を非表示にするオプション ===== */
            .hide-on-print {
                display: none !important;
            }

            /* ===== 出演者詳細セクション ===== */
            /* タイムテーブルと出演者詳細の間で必ず改ページ */
            #detailSection {
                break-before: page !important;
                page-break-before: always !important;
            }

            #detailSection h2 {
                font-size: 10pt !important;
                margin-bottom: 0.15cm !important;
                margin-top: 0 !important;
            }

            /* 1カラム化 */
            .detail-grid {
                display: block !important;
                columns: 1 !important;
            }

            /* カード */
            .detail-card,
            .glass-card {
                border: 1px solid #bbb !important;
                background: #fff !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                padding: 4px 6px !important;
                font-size: 7pt !important;
                margin-bottom: 4px !important;
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                -webkit-column-break-inside: avoid !important;
                overflow: visible !important;
            }

            .detail-card .card-header,
            .detail-card .card-header div {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
            }

            .detail-card .card-header {
                padding-bottom: 3px !important;
                margin-bottom: 4px !important;
                gap: 4px !important;
            }

            .detail-card .card-header .order-badge {
                width: 20px !important;
                height: 20px !important;
                font-size: 8pt !important;
                background: #333 !important;
                color: #fff !important;
                -webkit-text-fill-color: #fff !important;
            }

            .detail-card .card-header div[style*="font-size:1.1rem"] {
                font-size: 8pt !important;
            }

            .detail-card .song-item,
            .detail-card .song-item div,
            .detail-card .song-item span,
            .detail-card .song-item strong {
                color: #000 !important;
                -webkit-text-fill-color: #000 !important;
            }

            .detail-card .song-item {
                padding: 1px 0 !important;
                font-size: 6.5pt !important;
                gap: 3px !important;
            }

            .detail-card .song-item strong {
                font-size: 7pt !important;
            }

            .detail-card .s-num {
                width: 14px !important;
                height: 14px !important;
                font-size: 5.5pt !important;
                background: #eee !important;
                color: #333 !important;
                -webkit-text-fill-color: #333 !important;
            }

            /* テクリクエスト */
            .detail-card div[style*="border-top"] p {
                color: #333 !important;
                -webkit-text-fill-color: #333 !important;
            }

            /* ===== ページ分割制御 ===== */
            /* タイムテーブルのテーブル内で改ページしない */
            .tt-wrap,
            .tt-wrap table,
            .tt-wrap thead,
            .tt-wrap tbody {
                break-inside: auto !important;
                page-break-inside: auto !important;
            }

            /* テーブル行の途中で切れないようにする */
            .tt-wrap tbody tr {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>

<body>
    <header class="site-header no-print">
        <div class="container">
            <a href="index.html" class="site-logo"><span>SmileRT</span></a>
            <nav class="site-nav">
                <a href="index.html">ホーム</a>
                <a href="performer.html">出演者</a>
                <a href="admin.html">管理</a>
                <a href="view.html" class="active">技術資料</a>
            </nav>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="container page-enter">
            <div class="view-header">
                <h1 class="text-gradient" id="viewTitle">技術資料</h1>
                <div class="event-selector mt-lg no-print">
                    <select class="form-select" id="eventSelect" onchange="onEventSelect(this.value)">
                        <option value="">イベントを選択...</option>
                    </select>
                    <div class="export-btns" id="exportBtns" style="display:none">
                        <button class="btn btn-secondary btn-sm" onclick="copyTSV()" title="Google Sheetsにそのままペーストできます">📋 Sheetsにコピー</button>
                        <button class="btn btn-secondary btn-sm" onclick="copyHTMLTable()" title="Excelに書式付きでペーストできます">📊 Excelにコピー</button>
                        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">📄 CSV保存</button>
                        <button class="btn btn-secondary btn-sm" onclick="doPrint()">🖨️ 印刷</button>
                    </div>
                    <div id="printOptions" class="mt-sm" style="display:none">
                        <label class="form-check" style="font-size:0.85rem">
                            <input type="checkbox" id="printDetailCheck" checked>
                            印刷時に出演者詳細を含める
                        </label>
                    </div>
                </div>
            </div>
            <div id="scheduleInfo" class="schedule-info" style="display:none"></div>
            <div class="summary-bar" id="summaryBar" style="display:none"></div>
            <div id="timetableSection" style="display:none">
                <div class="tt-header-row mb-md">
                    <h2 style="margin:0">タイムテーブル</h2>
                    <button type="button" class="rehearsal-toggle no-print" id="rehearsalToggle" style="display:none" onclick="toggleRehearsalTime()">
                        <span class="toggle-icon"></span>
                        リハ時間
                    </button>
                </div>
                <div class="tt-wrap" id="ttWrap"></div>
            </div>
            <div id="detailSection" style="display:none">
                <h2 class="mt-2xl mb-md">出演者詳細</h2>
                <div class="detail-grid" id="detailGrid"></div>
            </div>
            <div class="empty-state" id="noEvent">
                <div class="empty-icon" style="font-size:1.5rem;opacity:0.3">—</div>
                <p>イベントを選択すると技術資料が表示されます</p>
            </div>

            <div class="no-print" style="text-align:center; margin-top:var(--space-2xl); padding:var(--space-lg) 0">
                <a href="guide-tech.html" style="display:inline-flex; align-items:center; gap:0.3rem; color:var(--text-muted); font-size:0.78rem; text-decoration:none; padding:0.4rem 0.8rem; border-radius:var(--radius-full); transition:all 0.2s ease"
                   onmouseover="this.style.color='var(--accent-blue)'; this.style.background='var(--bg-glass)'"
                   onmouseout="this.style.color='var(--text-muted)'; this.style.background='transparent'">
                    📖 技術資料の見方ガイド
                </a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script>
        let selectedEventId = null;
        let showRehearsalTime = false;
        document.addEventListener('DOMContentLoaded', () => { db.init().then(() => {
            const events = db.getEvents(), sel = document.getElementById('eventSelect');
            events.forEach(e => { const o = document.createElement('option'); o.value = e.id; o.textContent = `${e.title || '無題'} (${e.date || '日付未定'})`; sel.appendChild(o) });
            const u = getParam('event'); if (u) { sel.value = u; onEventSelect(u); }
        }); });

        function onEventSelect(id) {
            selectedEventId = id; setParams({ event: id || null });
            const show = !!id;
            document.getElementById('noEvent').style.display = show ? 'none' : '';
            document.getElementById('exportBtns').style.display = show ? '' : 'none';
            document.getElementById('printOptions').style.display = show ? '' : 'none';
            ['scheduleInfo', 'summaryBar', 'timetableSection', 'detailSection'].forEach(s => document.getElementById(s).style.display = show ? '' : 'none');
            if (show) renderView();
        }

        function renderView() {
            const ev = db.getEvent(selectedEventId); if (!ev) return;
            document.getElementById('viewTitle').textContent = ev.title || '技術資料';

            // Schedule Info
            const s = ev.schedule || {};
            const items = [
                ['会場入り', s.venueEntry], ['リハ開始', s.rehearsalStart], ['リハ終了', s.rehearsalEnd],
                ['顔合わせ', s.meetGreet], ['MC', s.mc], ['オープン', s.doorsOpen],
                ['スタート', ev.startTime], ['交流会開始', s.exchangeStart],
                ['交流会終了', s.exchangeEnd], ['完全撤収', s.fullClear]
            ].filter(([, v]) => v);
            document.getElementById('scheduleInfo').innerHTML = items.length ? items.map(([l, v]) => `<div class="si"><span class="si-label">${l}</span><span class="si-time">${v}</span></div>`).join('') : '';
            document.getElementById('scheduleInfo').style.display = items.length ? '' : 'none';

            // Summary
            const totalP = ev.performers.length;
            const totalS = ev.performers.reduce((s, p) => s + p.songs.length, 0);
            const totalD = ev.performers.reduce((s, p) => s + p.songs.reduce((a, song) => a + (song.duration || 0), 0), 0);
            document.getElementById('summaryBar').innerHTML = `
        <div class="si">${ev.date || '日付未定'}</div>
        ${ev.venue ? `<div class="si">${escHtml(ev.venue)}</div>` : ''}
        <div class="si">出演者 <strong>${totalP}</strong>人</div>
        <div class="si">全 <strong>${totalS}</strong>曲</div>
        <div class="si">総尺 <strong>${formatDuration(totalD)}</strong></div>`;

            renderTimetable(ev); renderDetailCards(ev);
        }

        function renderTimetable(ev) {
            const timeline = db.calculateTimetable(ev), wrap = document.getElementById('ttWrap');
            if (!timeline.length) { wrap.innerHTML = '<p class="text-muted text-center" style="padding:var(--space-lg)">データなし</p>'; return; }

            // リハーサル開始時間の有無を確認（トグル表示制御用）
            const rehearsalStart = ev.schedule && ev.schedule.rehearsalStart ? ev.schedule.rehearsalStart : null;
            const toggleBtn = document.getElementById('rehearsalToggle');
            toggleBtn.style.display = rehearsalStart ? '' : 'none';
            if (!rehearsalStart) showRehearsalTime = false;
            toggleBtn.classList.toggle('active', showRehearsalTime);

            const rCol = showRehearsalTime;
            const rTh = rCol ? '<th class="col-rehearsal">リハ経過</th>' : '';

            // 曲尺累積でリハ経過時間を計算
            let rehearsalElapsedSec = 0;

            wrap.innerHTML = `<table><thead><tr>
        <th>曲順</th><th>時間</th>${rTh}<th>演者名</th><th>曲名</th><th class="col-group-start">プロンプト</th>
        <th>きっかけ・照明・音響</th><th>備考</th><th class="col-group-start">マイク</th><th>カウント</th><th>Key</th>
        <th class="col-group-start">曲尺</th><th class="col-group-start">完成音源</th><th>音源確認</th><th>はれむぅ確認</th>
      </tr></thead><tbody>${timeline.map(t => {
                const elapsedMin = Math.floor(rehearsalElapsedSec / 60);
                const elapsedH = Math.floor(elapsedMin / 60);
                const elapsedM = elapsedMin % 60;
                const elapsedStr = `${elapsedH}:${elapsedM.toString().padStart(2, '0')}`;
                const rTd = rCol ? `<td class="col-rehearsal">${elapsedStr}</td>` : '';
                rehearsalElapsedSec += (t.duration || 0);
                const specialColspan = rCol ? 13 : 12;
                if (t.slotType !== 'song') return `<tr class="special-row"><td>${escHtml(t.songTitle || t.slotType)}</td><td style="font-family:var(--font-mono);font-size:0.78rem">${t.timeRange}</td>${rTd}<td colspan="${specialColspan}"></td></tr>`;
                return `<tr>
          <td style="text-align:center;font-size:0.78rem;color:var(--text-muted)">${t.order}</td>
          <td style="font-family:var(--font-mono);font-size:0.78rem;color:var(--accent-blue)">${t.timeRange}</td>
          ${rTd}
          <td><span class="flex items-center gap-xs">${t.cyalumeColor ? `<span class="color-swatch" style="background:${t.cyalumeColor};width:10px;height:10px"></span>` : ''}${escHtml(t.performerName)}</span></td>
          <td>${escHtml(t.songTitle)}${t.type === 'original' ? ' <span class="badge badge-purple" style="font-size:0.6rem">O</span>' : ''}</td>
          <td class="col-group-start" style="text-align:center">${escHtml(t.promptNumber)}</td>
          <td style="font-size:0.78rem">${escHtml(t.cue)}</td>
          <td style="font-size:0.78rem">${escHtml(t.remarks)}</td>
          <td class="col-group-start" style="text-align:center">${t.micCount || 0}</td>
          <td style="text-align:center">${escHtml(t.count)}</td>
          <td style="text-align:center">${escHtml(t.key)}</td>
          <td class="col-group-start" style="font-family:var(--font-mono);font-size:0.78rem;text-align:center">${t.durationStr}</td>
          <td class="col-group-start ${t.completedAudio === '完成済み' ? 'audio-done' : t.completedAudio === '受け取り済み' ? 'audio-received' : ''}" style="text-align:center;font-size:0.78rem">${escHtml(t.completedAudio)}</td>
          <td style="text-align:center">${t.audioConfirmed ? '✓' : ''}</td>
          <td style="text-align:center">${t.audioConfirmedHaremu ? '✓' : ''}</td>
        </tr>`;
            }).join('')}</tbody></table>`;
        }

        function toggleRehearsalTime() {
            showRehearsalTime = !showRehearsalTime;
            renderView();
        }

        function renderDetailCards(ev) {
            const grid = document.getElementById('detailGrid');
            if (!ev.performers.length) { grid.innerHTML = '<p class="text-muted">出演者なし</p>'; return; }
            grid.innerHTML = ev.performers.map((p, i) => `
        <div class="glass-card detail-card">
          <div class="card-header">
            <span class="order-badge">${i + 1}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:1.1rem;font-weight:700">${escHtml(p.name || '未入力')}</div>
              <div class="flex gap-sm" style="font-size:0.78rem;color:var(--text-muted);flex-wrap:wrap">
                ${p.twitter ? `<span>𝕏 ${escHtml(p.twitter)}</span>` : ''}${p.discord ? `<span>Discord: ${escHtml(p.discord)}</span>` : ''}${p.hoodie ? `<span>パーカー: ${escHtml(p.hoodie)}</span>` : ''}
              </div>
            </div>
            ${p.cyalumeColor ? `<span class="color-swatch" style="background:${p.cyalumeColor}"></span>` : ''}
          </div>
          ${p.iconUrl ? `<div style="font-size:0.8rem;margin-bottom:var(--space-sm)"><a href="${escHtml(p.iconUrl)}" target="_blank">アイコン素材</a></div>` : ''}
          <div class="song-list">${p.songs.map((s, si) => `
            <div class="song-item">
              <span class="s-num">${si + 1}</span>
              <div style="flex:1;min-width:0">
                <div class="flex items-center gap-xs" style="flex-wrap:wrap">
                  <strong style="font-size:0.9rem">${escHtml(s.title || '曲名未入力')}</strong>
                  <span class="badge ${s.type === 'original' ? 'badge-purple' : 'badge-blue'}" style="font-size:0.6rem">${s.type === 'original' ? 'オリジナル' : 'カバー'}</span>
                  ${s.duration ? `<span style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted)">${formatDuration(s.duration)}</span>` : ''}
                </div>
                ${s.cue ? `<div style="font-size:0.78rem;color:var(--text-secondary);margin-top:2px">${escHtml(s.cue)}</div>` : ''}
                ${s.remarks ? `<div style="font-size:0.78rem;color:var(--text-secondary);margin-top:2px">${escHtml(s.remarks)}</div>` : ''}
                ${s.audioUrl ? `<div style="font-size:0.75rem;margin-top:2px"><a href="${escHtml(s.audioUrl)}" target="_blank">音源</a></div>` : ''}
              </div>
            </div>`).join('')}
          </div>
          ${p.techRequests ? `<div style="margin-top:var(--space-md);padding-top:var(--space-md);border-top:1px solid var(--border-color)"><p style="font-size:0.82rem;color:var(--text-secondary)">${escHtml(p.techRequests)}</p></div>` : ''}
        </div>`).join('');
        }

        function exportCSV() {
            if (selectedEventId) db.exportCSV(selectedEventId);
        }

        function copyTSV() {
            if (!selectedEventId) return;
            const tsv = db.exportTSV(selectedEventId);
            if (!tsv) return;
            navigator.clipboard.writeText(tsv).then(() => {
                showToast('Sheets用データをコピーしました！ Google Sheetsで Ctrl+V で貼り付けてください', 'success');
            }).catch(() => {
                showToast('コピーに失敗しました', 'error');
            });
        }

        function copyHTMLTable() {
            if (!selectedEventId) return;
            const html = db.exportHTMLTable(selectedEventId);
            const plainText = db.exportTSV(selectedEventId);
            if (!html) return;
            const blob = new Blob([html], { type: 'text/html' });
            const textBlob = new Blob([plainText], { type: 'text/plain' });
            const item = new ClipboardItem({
                'text/html': blob,
                'text/plain': textBlob
            });
            navigator.clipboard.write([item]).then(() => {
                showToast('Excel用データをコピーしました！ Excelで Ctrl+V で貼り付けてください', 'success');
            }).catch(() => {
                showToast('コピーに失敗しました', 'error');
            });
        }
        function doPrint() {
            const includeDetail = document.getElementById('printDetailCheck').checked;
            const detailSection = document.getElementById('detailSection');
            if (!includeDetail) {
                detailSection.classList.add('hide-on-print');
            } else {
                detailSection.classList.remove('hide-on-print');
            }

            // テーブルのstickyヘッダーを印刷前に無効化（レイアウト崩れ防止）
            const wrap = document.getElementById('ttWrap');
            const table = wrap?.querySelector('table');
            if (table) {
                table.style.minWidth = '0';
            }

            // 少し遅延して印刷ダイアログを表示（DOM更新待ち）
            setTimeout(() => {
                window.print();
                // 印刷後にリセット
                setTimeout(() => {
                    if (table) {
                        table.style.minWidth = '';
                    }
                }, 500);
            }, 150);
        }
    </script>
</body>

</html>
